<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDT AI 분석 대시보드 | AI 자동화 실험실</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
.header{background:#1a1a1a;padding:24px 36px;display:flex;align-items:center;justify-content:space-between;}
.header-left .badge{font-size:11px;color:#666;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.header-left .title{font-size:22px;font-weight:700;color:#fff;}
.header-left .sub{font-size:12px;color:#888;margin-top:2px;}
.header-right{font-size:11px;color:#555;text-align:right;line-height:1.6;}
.container{max-width:1100px;margin:0 auto;padding:28px 20px;}

/* 빠른 질문 버튼 */
.quick-section{margin-bottom:20px;}
.quick-label{font-size:11px;font-weight:600;color:#888;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;}
.quick-btns{display:flex;flex-wrap:wrap;gap:8px;}
.qbtn{font-size:12px;padding:7px 14px;border:1px solid #d4d4d0;border-radius:20px;background:#fff;cursor:pointer;color:#444;transition:all .15s;}
.qbtn:hover{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}

/* 입력창 */
.input-area{display:flex;gap:10px;margin-bottom:24px;}
.input-wrap{flex:1;position:relative;}
.chat-input{width:100%;padding:13px 16px;font-size:14px;border:1.5px solid #e0e0dc;border-radius:10px;background:#fff;outline:none;transition:border .15s;font-family:inherit;}
.chat-input:focus{border-color:#1a1a1a;}
.send-btn{padding:13px 22px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* 응답 영역 */
.result-area{min-height:200px;}
.loading{display:none;align-items:center;gap:12px;padding:24px;background:#fff;border-radius:10px;border:1px solid #e8e8e8;margin-bottom:16px;}
.loading.show{display:flex;}
.spinner{width:20px;height:20px;border:2px solid #e0e0dc;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:#666;}

.answer-block{background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:24px;margin-bottom:16px;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.answer-query{font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #f0f0ee;}
.answer-body{font-size:13px;line-height:1.8;color:#333;white-space:pre-wrap;}
.answer-body strong{font-weight:700;color:#1a1a1a;}
.answer-meta{margin-top:14px;font-size:11px;color:#bbb;text-align:right;}

/* 차트 */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;}
.chart-box{background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:18px;}
.chart-title{font-size:11px;font-weight:600;color:#888;letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px;}
.chart-inner{position:relative;height:180px;}

/* 빈 상태 */
.empty-state{text-align:center;padding:60px 20px;color:#bbb;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;}

@media(max-width:640px){
  .chart-row{grid-template-columns:1fr;}
  .header{flex-direction:column;gap:8px;align-items:flex-start;}
  .quick-btns{gap:6px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="badge">🤖 AI 자동화 실험실 · KDT 교육운영팀</div>
    <div class="title">KDT AI 분석 대시보드</div>
    <div class="sub">자연어로 질문하면 데이터 기반 인사이트를 즉시 제공합니다</div>
  </div>
  <div class="header-right">
    데이터: 7개 과정 · 27회차 · 272건<br>
    Powered by Claude AI
  </div>
</div>

<div class="container">

  <div class="quick-section">
    <div class="quick-label">빠른 질문</div>
    <div class="quick-btns">
      <button class="qbtn" onclick="setQ('전체 이탈 데이터 분석해줘')">📊 전체 분석</button>
      <button class="qbtn" onclick="setQ('데이터엔지니어링 6기 6회차 분석해줘')">🔍 데이터엔지니어링 6회차</button>
      <button class="qbtn" onclick="setQ('백엔드 과정 이탈 분석해줘')">💻 백엔드 과정</button>
      <button class="qbtn" onclick="setQ('AI 백엔드 과정 분석해줘')">🤖 AI 백엔드</button>
      <button class="qbtn" onclick="setQ('1주차 이탈이 왜 이렇게 많아? 원인과 대책 알려줘')">🚨 1주차 병목 원인</button>
      <button class="qbtn" onclick="setQ('이탈 사유별 분포와 운영 개선 방향 알려줘')">📋 이탈 사유 분석</button>
      <button class="qbtn" onclick="setQ('차기 기수 운영 제언 3가지 알려줘')">✅ 운영 제언</button>
      <button class="qbtn" onclick="setQ('긍정적 이탈(취업)과 부정적 이탈을 분리해서 분석해줘')">🟢 취업 이탈 분리</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <input class="chat-input" id="chatInput" type="text" placeholder="예) 데이터엔지니어링 6회차 분석해줘 / 1주차 이탈 원인은? / 백엔드 과정만 보여줘" />
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendQuery()">분석하기 →</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">데이터 분석 중...</div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-text">질문을 입력하거나 빠른 질문을 선택해 주세요</div>
    </div>
  </div>

</div>

<script>
const KDT_DATA = `
[전체 데이터 요약]
총 이탈 건수: 272건 / 7개 과정 / 27개 회차

[과정별 이탈 현황]
- 백엔드 (5기 6회차, 7회차, 6기 8회차, 7기 9회차, 8기 10회차): 총 80건
  · 5기 6회차: 수강철회 9, 중도포기 8, 조기취업 2 = 19건
  · 5기 7회차: 수강철회 10, 중도포기 9, 조기취업 2 = 21건
  · 6기 8회차: 수강철회 8, 중도포기 6, 조기취업 2 = 16건
  · 7기 9회차: 수강철회 7, 중도포기 5, 조기취업 2, 제적 1 = 15건
  · 8기 10회차: 수강철회 5, 중도포기 4, 조기취업 1 = 10건 (추정)

- AI 백엔드 (1기~5기): 총 48건
  · 1기 1회차: 수강철회 6, 중도포기 5 = 11건
  · 2기 2회차: 수강철회 5, 중도포기 5 = 10건
  · 3기 3회차: 수강철회 5, 중도포기 5 = 10건
  · 4기 4회차: 수강철회 4, 중도포기 3, 조기취업 1 = 8건
  · 5기 5회차: 수강철회 3, 중도포기 2, 조기취업 3 = 9건

- 데이터분석 (6기~9기): 총 36건
  · 6기 7회차: 수강철회 4, 중도포기 5, 제적 1 = 10건
  · 7기 8회차: 수강철회 3, 중도포기 4, 조기취업 1 = 8건
  · 8기 9회차: 수강철회 3, 중도포기 4, 조기취업 2 = 9건
  · 9기 10회차: 수강철회 2, 중도포기 4, 조기취업 1, 제적 2 = 9건

- 웹풀스택 (6기~9기): 총 31건
  · 6기 7회차: 수강철회 2, 중도포기 4, 조기취업 3 = 9건
  · 7기 8회차: 수강철회 2, 중도포기 3, 조기취업 3 = 8건
  · 8기 9회차: 수강철회 2, 중도포기 3, 조기취업 2 = 7건
  · 9기 10회차: 수강철회 1, 중도포기 3, 조기취업 1, 제적 2 = 7건

- 백엔드 단기심화 (1기~4기): 총 31건
  · 1기 1회차: 수강철회 8, 중도포기 3 = 11건
  · 2기 2회차: 수강철회 6, 중도포기 2 = 8건
  · 3기 3회차: 수강철회 5, 중도포기 2 = 7건
  · 4기 4회차: 수강철회 3, 중도포기 2 = 5건

- 프론트엔드 (4기~6기): 총 30건
  · 4기 5회차: 수강철회 6, 중도포기 6 = 12건
  · 5기 6회차: 수강철회 5, 중도포기 5 = 10건
  · 6기 7회차: 수강철회 3, 중도포기 4, 제적 1 = 8건

- 데이터엔지니어링 (6기, 7기): 총 16건
  · 6기 6회차: 수강철회 4, 중도포기 4, 조기취업 2, 제적 1 = 11건
  · 7기 7회차: 수강철회 2, 중도포기 2, 조기취업 1 = 5건

[이탈구분 전체]
- 수강철회: 123건 (45.2%)
- 중도포기: 112건 (41.2%)
- 조기취업: 29건 (10.7%)
- 제적: 8건 (2.9%)

[이탈사유 전체]
- 취업·조기취업/입사: 73건 (26.8%) ← 긍정적 이탈
- 기타: 45건 (16.5%)
- 훈련·제도 이슈: 34건 (12.5%)
- 커리큘럼/운영/수업방식 불일치: 22건 (8.1%)
- 학업(복학/개강/시험): 20건 (7.4%)
- 건강·가정: 19건 (7.0%)
- 근무·시간 병행: 16건 (5.9%)
- 난이도/기초부족: 15건 (5.5%)
- 진로변경(타직무/해외/전공): 14건 (5.1%)
- 다른 교육/프로그램 선택: 12건 (4.4%)

[주차별 이탈]
1주: 105건(38.6%), 2주: 16건, 3주: 9건, 4주: 13건, 5주: 13건
6주: 12건, 7주: 9건, 8주: 9건, 9주: 7건, 10주: 10건
11주: 6건, 12주: 4건, 13주: 7건, 14주: 5건, 15주: 5건
16주: 5건, 17주: 4건, 18주: 3건, 19주: 4건, 20주: 4건
21주: 6건, 22주: 4건, 23주: 2건, 24주: 4건

[커리큘럼 단계]
- 백엔드/AI백엔드: 1주(CS기초) → 2-4주(Java/Spring) → 5-8주(심화개발) → 9-12주(프로젝트1) → 13-16주(클라우드/배포) → 17-20주(프로젝트2) → 21-24주(취업준비)
- 데이터분석: 1주(온보딩) → 2-3주(기초이론) → 3-4주(프로젝트1) → 4-6주(중급이론) → 이후 심화
- 데이터엔지니어링: 1주(온보딩) → 2-4주(Python/SQL기초) → 5-8주(인프라/파이프라인) → 9-12주(프로젝트) → 이후 심화
`;

const SYSTEM_PROMPT = `당신은 KDT(K-Digital Training) 교육 운영 데이터 분석 전문가입니다.
아래 실제 데이터를 기반으로 질문에 답하세요.

${KDT_DATA}

응답 규칙:
1. 반드시 데이터에 있는 수치만 사용. 없는 건 "데이터 부족"으로 명시.
2. 항상 건수 + 비율(%) 함께 표기.
3. 조기취업은 긍정적 이탈로 분리해서 언급.
4. 응답 구조: 
   📊 핵심 수치 요약 (굵게)
   📋 상세 분석
   💡 인사이트
   ✅ 운영 제언 (해당 시)
5. 마지막 줄에 반드시 JSON 형식으로 차트 데이터 포함:
   CHART_DATA:{"type":"bar OR pie","labels":[...],"values":[...],"title":"..."}
   (차트가 의미있을 때만, 없으면 CHART_DATA:null)
6. 한국어로 답변.`;

let chartInstances = {};

function setQ(text) {
  document.getElementById('chatInput').value = text;
  document.getElementById('chatInput').focus();
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendQuery();
});

async function sendQuery() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q) return;

  const btn = document.getElementById('sendBtn');
  const loading = document.getElementById('loading');
  const loadingText = document.getElementById('loadingText');
  const resultArea = document.getElementById('resultArea');

  btn.disabled = true;
  loading.classList.add('show');
  loadingText.textContent = '데이터 분석 중...';

  const msgs = [
    { role: 'user', content: q }
  ];

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: msgs
      })
    });

    const data = await res.json();
    const raw = data.content?.[0]?.text || '응답을 받지 못했습니다.';

    // 차트 데이터 파싱
    let chartData = null;
    let displayText = raw;
    const chartMatch = raw.match(/CHART_DATA:(.*?)(?:\n|$)/s);
    if (chartMatch) {
      try {
        const parsed = JSON.parse(chartMatch[1].trim());
        if (parsed) chartData = parsed;
      } catch(e) {}
      displayText = raw.replace(/CHART_DATA:.*$/s, '').trim();
    }

    // 마크다운 굵게 처리
    displayText = displayText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

    // 결과 블록 생성
    const block = document.createElement('div');
    block.className = 'answer-block';

    const queryDiv = document.createElement('div');
    queryDiv.className = 'answer-query';
    queryDiv.textContent = '질문: ' + q;

    const bodyDiv = document.createElement('div');
    bodyDiv.className = 'answer-body';
    bodyDiv.innerHTML = displayText;

    const metaDiv = document.createElement('div');
    metaDiv.className = 'answer-meta';
    metaDiv.textContent = new Date().toLocaleTimeString('ko-KR') + ' · Claude AI 분석';

    block.appendChild(queryDiv);
    block.appendChild(bodyDiv);

    // 차트 렌더링
    if (chartData && chartData.labels && chartData.values) {
      const chartRow = document.createElement('div');
      chartRow.className = 'chart-row';

      const chartBox = document.createElement('div');
      chartBox.className = 'chart-box';
      chartBox.style.gridColumn = '1 / -1';

      const chartTitle = document.createElement('div');
      chartTitle.className = 'chart-title';
      chartTitle.textContent = chartData.title || '분석 결과';

      const chartInner = document.createElement('div');
      chartInner.className = 'chart-inner';
      const canvas = document.createElement('canvas');
      const cid = 'c_' + Date.now();
      canvas.id = cid;
      chartInner.appendChild(canvas);

      chartBox.appendChild(chartTitle);
      chartBox.appendChild(chartInner);
      chartRow.appendChild(chartBox);

      block.appendChild(chartRow);
      block.appendChild(metaDiv);
      resultArea.innerHTML = '';
      resultArea.appendChild(block);

      // 차트 생성
      const colors = ['#dc2626','#ea580c','#d97706','#16a34a','#2563eb','#7c3aed','#db2777','#0891b2','#65a30d','#6b7280'];
      const isBar = chartData.type === 'bar';
      new Chart(document.getElementById(cid), {
        type: isBar ? 'bar' : 'doughnut',
        data: {
          labels: chartData.labels,
          datasets: [{
            data: chartData.values,
            backgroundColor: isBar
              ? colors.slice(0, chartData.values.length)
              : colors.slice(0, chartData.values.length),
            borderRadius: isBar ? 4 : 0,
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: isBar ? undefined : '55%',
          plugins: {
            legend: { display: !isBar, position: 'right', labels: { font: { size: 11 }, padding: 10 } },
            tooltip: { callbacks: { label: c => c.label + ': ' + c.parsed + (isBar ? '건' : '건 (' + Math.round(c.parsed / chartData.values.reduce((a,b)=>a+b,0)*100) + '%)') } }
          },
          scales: isBar ? {
            x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#999' } },
            y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 10 }, color: '#999' } }
          } : {}
        }
      });
    } else {
      block.appendChild(metaDiv);
      resultArea.innerHTML = '';
      resultArea.appendChild(block);
    }

    input.value = '';
  } catch(err) {
    resultArea.innerHTML = `<div class="answer-block"><div class="answer-body">오류가 발생했습니다: ${err.message}</div></div>`;
  } finally {
    btn.disabled = false;
    loading.classList.remove('show');
  }
}
</script>
</body>
</html>
